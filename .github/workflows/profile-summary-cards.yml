name: GitHub Profile Summary Cards

on:
  schedule:
    # Her gün UTC 00:00'da çalışır
    - cron: "0 0 * * *"
  workflow_dispatch:    # Manuel tetikleme için
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    name: Generate summary cards
    steps:
      - uses: actions/checkout@v4
        with:
          # PAT'i checkout'a da ver — git remote bunu kullansın, push düzgün çalışsın
          token: ${{ secrets.SUMMARY_GITHUB_TOKEN }}

      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          UTC_OFFSET: 3          # Istanbul (UTC+3)
          EXCLUDE: "ShaderLab"  # İstersen bazı dilleri sayım dışı bırakabilirsin
